<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspiración Boutique - Acceso Seguro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Pantalla de carga inicial */
        #loadingScreen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 9999; display: flex; 
            justify-content: center; align-items: center; 
        }

        #loginSection { min-height: 100vh; background: linear-gradient(135deg, #0d6efd 0%, #1a1d20 100%); display: none; }
        .login-card { background: white; border-radius: 15px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        
        .sidebar { min-height: 100vh; background-color: #1a1d20; color: white; display: flex; flex-direction: column; }
        .nav-link { color: #adb5bd; cursor: pointer; padding: 12px 20px; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { color: white; background-color: #0d6efd; border-radius: 8px; }
        .card-kpi { border-radius: 12px; transition: transform 0.2s; }
        .section-view { display: none; }
        .section-view.active { display: block; animation: fadeIn 0.4s; }
        .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .fila-articulo { background: #fdfdfd; padding: 10px; border-radius: 8px; border: 1px solid #e9ecef; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 767.98px) {
            .sidebar { min-height: auto; position: sticky; top: 0; z-index: 1050; padding: 10px !important; }
            .nav-link { padding: 8px 15px; font-size: 0.9rem; }
            .main-content { padding: 15px !important; }
        }
    </style>
</head>
<body>

<div id="loadingScreen">
    <div class="text-center">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 fw-bold text-primary">Cargando Inspiración Boutique...</p>
    </div>
</div>

<div id="loginSection" class="justify-content-center align-items-center">
    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary"><i class="bi bi-lock-fill"></i></h2>
            <h4 class="fw-bold text-dark">Inspiración Boutique</h4>
            <p class="text-muted small">Inicia sesión para continuar</p>
        </div>
        <form onsubmit="iniciarSesion(event)">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Correo Electrónico</label>
                <input type="email" id="loginEmail" class="form-control" required placeholder="admin@boutique.com">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary">Contraseña</label>
                <input type="password" id="loginPassword" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" id="btnLogin" class="btn btn-primary w-100 fw-bold py-2">Ingresar</button>
        </form>
    </div>
</div>

<div class="container-fluid" id="mainApp" style="display: none;">
    <div class="row">
        <div class="col-md-2 sidebar p-3 shadow">
            <div>
                <h4 class="text-center mt-3 mb-1 text-primary fw-bold"><i class="bi bi-cloud-check-fill"></i> Inspiración Boutique</h4>
                <p class="text-center small text-success mb-4"><i class="bi bi-shield-check"></i> Conexión Segura</p>
                <ul class="nav flex-row flex-md-column flex-nowrap overflow-auto">
                    <li class="nav-item mb-md-2"><a class="nav-link active" onclick="cambiarVista('dashboard', this)"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                    <li class="nav-item mb-md-2"><a class="nav-link" onclick="cambiarVista('ventas', this)"><i class="bi bi-receipt me-2"></i> Ventas</a></li>
                    <li class="nav-item mb-md-2"><a class="nav-link" onclick="cambiarVista('cartera', this)"><i class="bi bi-wallet2 me-2"></i> Cobros</a></li>
                    <li class="nav-item mb-md-2"><a class="nav-link" onclick="cambiarVista('clientes', this)"><i class="bi bi-people-fill me-2"></i> Clientes</a></li>
                    <li class="nav-item mb-md-2"><a class="nav-link" onclick="cambiarVista('cumpleanos', this)"><i class="bi bi-gift me-2"></i> Cumpleaños</a></li>
                </ul>
            </div>
            <div class="mt-auto pt-4 pb-2 text-center d-none d-md-block">
                <hr class="border-secondary">
                <button class="btn btn-outline-danger btn-sm w-100 fw-bold" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>

        <div class="col-md-10 p-4 main-content">
            <div id="dashboard" class="section-view active">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                    <h2 class="fw-bold text-dark">Panel de Control</h2>
                    <input type="month" id="filtroMesDashboard" class="form-control w-auto shadow-sm" onchange="actualizarDashboard()">
                </div>
                <div class="row g-3">
                    <div class="col-md-4"><div class="card card-kpi shadow-sm p-3 border-0" style="border-left: 5px solid #0d6efd;"><h6>Ingresos</h6><h3 id="kpi-ingresos">$ 0</h3></div></div>
                    <div class="col-md-4"><div class="card card-kpi shadow-sm p-3 border-0" style="border-left: 5px solid #dc3545;"><h6>Costos</h6><h3 id="kpi-costos">$ 0</h3></div></div>
                    <div class="col-md-4"><div class="card card-kpi shadow-sm p-3 border-0" style="border-left: 5px solid #198754;"><h6>Ganancia</h6><h3 id="kpi-ganancias">$ 0</h3></div></div>
                </div>
                <div class="card mt-4 p-3 border-0 shadow-sm"><canvas id="tendenciaChart" style="height: 300px;"></canvas></div>
            </div>

            </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApPs8hF5WWG2dmO22_L-yscjNX5CD8cQM",
      authDomain: "inspiracionboutique-96047.firebaseapp.com",
      projectId: "inspiracionboutique-96047",
      storageBucket: "inspiracionboutique-96047.firebasestorage.app",
      messagingSenderId: "990906061558",
      appId: "1:990906061558:web:ee33c056f6fd0e6bb752d7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // CONTROL DE ESTADOS CORREGIDO
    onAuthStateChanged(auth, (user) => {
        const loading = document.getElementById('loadingScreen');
        const login = document.getElementById('loginSection');
        const app = document.getElementById('mainApp');

        loading.style.display = 'none'; // Quitamos el cargando

        if (user) {
            login.style.display = 'none';
            login.classList.remove('d-flex');
            app.style.display = 'block';
            iniciarApp();
        } else {
            app.style.display = 'none';
            login.style.display = 'flex';
            login.classList.add('d-flex');
        }
    });

    window.iniciarSesion = async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (err) {
            alert("Error: Datos incorrectos.");
        }
    };

    window.cerrarSesion = () => {
        if(confirm("¿Cerrar sesión en Inspiración Boutique?")) {
            signOut(auth);
        }
    };

    function iniciarApp() {
        // Aquí llamas a tus funciones de renderizado y escucha de Firestore
        console.log("Aplicación cargada y segura.");
    }
</script>
</body>
</html>
